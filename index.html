<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climbing Crag Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts for Retro Vibe -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS & JS for Mapping -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- SunCalc Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        retro: ['Space Mono', 'monospace'],
                    },
                    colors: {
                        neon: {
                            pink: '#ec4899',
                            cyan: '#22d3ee',
                            yellow: '#fde047'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* 80s Hard Shadows */
        .retro-shadow-pink { box-shadow: 4px 4px 0px 0px #ec4899; }
        .retro-shadow-cyan { box-shadow: 3px 3px 0px 0px #22d3ee; }
        
        /* Route Card Hover Effects */
        .retro-card { border: 2px solid #334155; transition: all 0.15s ease-out; }
        .retro-card:hover { 
            border-color: #22d3ee; 
            box-shadow: 4px 4px 0px 0px #22d3ee; 
            transform: translate(-2px, -2px); 
        }

        /* Map custom icon styling */
        .sun-label {
            color: #fde047; /* Neon Yellow */
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 13px;
            white-space: nowrap;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Sleek retro range slider */
        input[type=range] {
            -webkit-appearance: none; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 10px;
            border-radius: 2px;
            background: #ec4899; /* Neon Pink */
            cursor: pointer;
            margin-top: -7px; 
            border: 1px solid #fff;
            box-shadow: 2px 2px 0px #000;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #334155;
            border: 1px solid #0f172a;
            border-radius: 3px;
        }
        
        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #334155;
            border-radius: 0px;
            border: 1px solid #1e293b;
        }

        /* Select Dropdown Styling */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2322d3ee' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.25rem center;
            background-size: 1em;
        }
    </style>
</head>
<body class="font-sans antialiased bg-[#0f172a] text-slate-200 h-[100dvh] flex flex-col overflow-hidden selection:bg-neon-pink selection:text-white">

    <!-- Header -->
    <header class="bg-[#1e293b] border-b-2 border-neon-pink px-4 sm:px-6 py-3 flex justify-between items-center z-10 shrink-0 shadow-[0_4px_15px_rgba(236,72,153,0.15)] relative">
        <div class="flex items-center gap-2 sm:gap-3">
            <svg class="w-7 h-7 sm:w-8 sm:h-8 text-neon-cyan" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h1 class="text-xl sm:text-2xl font-black tracking-widest text-white uppercase italic">Send<span class="text-neon-pink">Tracker</span></h1>
        </div>
    </header>

    <!-- Main Content Layout -->
    <main class="flex-grow flex flex-col-reverse lg:flex-row overflow-hidden min-h-0">
        
        <!-- LEFT PANEL (Bottom on Mobile): Crag Info & Routes -->
        <div class="w-full lg:w-2/5 xl:w-1/3 bg-[#0f172a] flex flex-col border-r border-slate-700 z-10 flex-1 lg:flex-none lg:h-full relative overflow-hidden shrink-0">
            
            <!-- MAIN VIEW: Crag Info & Route List -->
            <div id="main-list-view" class="flex flex-col h-full w-full absolute inset-0 transition-transform duration-300 transform translate-x-0">
                <!-- Info Header -->
                <div class="p-4 sm:p-5 border-b-2 border-slate-800 shrink-0 bg-[#1e293b]">
                    <div class="flex items-center gap-2 text-[10px] sm:text-[11px] font-retro text-neon-cyan uppercase tracking-widest mb-1">
                        <span>CO</span> <span class="text-slate-500">&rsaquo;</span> <span>Clear Creek</span>
                    </div>
                    <h2 class="text-3xl sm:text-4xl font-black text-white mb-2 tracking-tight">Canal Zone</h2>
                    <div class="flex flex-wrap items-center gap-3 sm:gap-4 text-xs font-retro text-slate-400 mb-3">
                        <span class="flex items-center gap-1.5"><svg class="w-4 h-4 text-neon-pink" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg> <span id="crag-coords">39.7503, -105.2478</span></span>
                        <span class="flex items-center gap-1.5 text-neon-yellow border border-neon-yellow/30 bg-neon-yellow/10 px-2 py-0.5 rounded-sm"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg> SOUTH FACING</span>
                    </div>
                    <p class="text-slate-400 text-xs sm:text-sm leading-relaxed line-clamp-2">
                        The first crag on the left heading up Clear Creek... With excellent CCC rock, the crag holds shade through the mornings until around 2:00 in the summer.
                    </p>
                </div>

                <!-- Sorting Toolbar -->
                <div class="px-4 sm:px-5 py-2.5 bg-[#0f172a] border-b-2 border-slate-800 flex justify-between items-center shrink-0 z-10 shadow-md">
                    <span class="text-[10px] font-retro text-slate-500 uppercase tracking-widest font-bold">
                        <span id="route-count">29</span> Routes
                    </span>
                    <div class="flex items-center gap-2">
                        <label for="sort-select" class="text-[10px] font-retro text-slate-400 uppercase tracking-widest hidden sm:block">Sort:</label>
                        <select id="sort-select" onchange="sortRoutes(this.value)" class="bg-[#1e293b] text-neon-cyan text-[10px] sm:text-xs font-retro uppercase tracking-widest border border-slate-700 rounded-sm pl-2 pr-6 py-1 outline-none focus:border-neon-cyan focus:ring-1 focus:ring-neon-cyan cursor-pointer transition-colors shadow-sm">
                            <option value="ltr">Left &rsaquo; Right</option>
                            <option value="diff">Difficulty</option>
                        </select>
                    </div>
                </div>

                <!-- Routes List (Scrollable) -->
                <div class="overflow-y-auto custom-scrollbar flex-grow p-3 sm:p-4 space-y-3 bg-[#0f172a]" id="routes-container">
                    <!-- Routes injected via JS -->
                </div>
            </div>

            <!-- DETAIL VIEW: Single Route Info -->
            <div id="route-detail-view" class="flex flex-col h-full w-full absolute inset-0 bg-[#0f172a] z-20 transition-transform duration-300 transform translate-x-full overflow-y-auto custom-scrollbar shadow-[-10px_0_20px_rgba(0,0,0,0.5)]">
                
                <!-- Detail Header -->
                <div class="sticky top-0 bg-[#1e293b]/95 backdrop-blur-md border-b-2 border-neon-cyan p-4 shrink-0 z-10">
                    <button onclick="closeRouteDetail()" class="flex items-center gap-1.5 text-sm font-retro font-bold text-slate-400 hover:text-neon-pink transition-colors mb-4 py-1 group">
                        <svg class="w-5 h-5 transform group-hover:-translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        SYS.BACK()
                    </button>
                    <div class="flex justify-between items-start gap-3">
                        <h2 id="detail-name" class="text-2xl sm:text-3xl font-black text-white leading-tight">Route Name</h2>
                        <span id="detail-grade" class="text-xl sm:text-2xl font-retro font-bold text-neon-cyan retro-shadow-cyan bg-slate-800 px-3 py-1 border-2 border-neon-cyan whitespace-nowrap">5.10a</span>
                    </div>
                </div>

                <!-- Detail Content -->
                <div class="p-4 sm:p-5 space-y-6 sm:space-y-8">
                    <!-- Badges -->
                    <div class="flex flex-wrap gap-3" id="detail-badges">
                        <!-- Populated via JS -->
                    </div>

                    <!-- Stars -->
                    <div>
                        <h4 class="text-[10px] sm:text-xs font-retro font-bold text-slate-500 uppercase tracking-widest mb-2">User Rating</h4>
                        <div id="detail-stars" class="flex gap-1"></div>
                    </div>

                    <!-- Guidebook Beta -->
                    <div>
                        <h4 class="text-[10px] sm:text-xs font-retro font-bold text-neon-pink uppercase tracking-widest mb-2 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            Beta Terminal
                        </h4>
                        <!-- whitespace-pre-wrap allows \n characters to render as real line breaks in the text content -->
                        <div class="bg-black border-l-4 border-neon-pink rounded-r-lg p-4 text-xs sm:text-sm text-green-400 leading-relaxed font-retro whitespace-pre-wrap break-words shadow-inner min-h-[120px]" id="detail-info">
                            <!-- Populated via JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL (Top on Mobile): Interactive Sun Map -->
        <div class="w-full lg:w-3/5 xl:w-2/3 h-[40dvh] lg:h-full relative flex flex-col shrink-0 border-b-2 lg:border-b-0 lg:border-l-2 border-slate-700">
            <!-- Map Container -->
            <div id="map" class="absolute inset-0 bg-[#1a1a1a]"></div>

            <!-- COMPACT Map UI Overlay -->
            <div class="absolute bottom-2 lg:bottom-4 left-1/2 transform -translate-x-1/2 w-[95%] max-w-sm lg:max-w-md bg-[#1e293b]/90 backdrop-blur-md rounded border border-neon-cyan p-2 z-[1000] retro-shadow-cyan transition-all">
                <div class="flex items-center gap-3">
                    <!-- Date Output -->
                    <span id="date-display" class="text-neon-yellow font-retro font-bold text-[10px] lg:text-xs whitespace-nowrap w-12 lg:w-14 text-right">
                        APR 14
                    </span>
                    
                    <!-- Day of Year Slider -->
                    <input type="range" id="day-slider" min="1" max="365" value="104" class="flex-grow">
                    
                    <!-- Sun Icon -->
                    <svg class="w-4 h-4 lg:w-5 lg:h-5 text-neon-cyan shrink-0 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- 1. CRAG DATA ---
        const canalZoneData = {
            name: "Canal Zone",
            lat: 39.7503,
            lng: -105.2478,
            routes: [
                { name: "Cut Loose", grade: "5.11a", stars: 3, type: "Sport", height: "75 ft", pitches: 1 },
                { name: "Bear's Choice", grade: "5.10b", stars: 3, type: "Sport", height: "75 ft", pitches: 1 },
                { name: "Bear's Choice Easy Var", grade: "5.8+", stars: 2, type: "Sport", height: "75 ft", pitches: 1 },
                { name: "Box of Rain", grade: "5.8", stars: 3.5, type: "Sport", height: "75 ft", pitches: 1 },
                { name: "Ripple", grade: "5.8", stars: 4, type: "Sport", height: "75 ft", pitches: 1 },
                { name: "Venice Beach", grade: "5.8", stars: 3.5, type: "Sport", height: "75 ft", pitches: 1 },
                { name: "Holiday Road", grade: "5.8", stars: 3.5, type: "Sport", height: "70 ft", pitches: 1 },
                { name: "Dirt Trek", grade: "5.9", stars: 2, type: "Trad", height: "132 ft", pitches: 1 },
                { name: "Ridin' the Moon Buggy", grade: "5.9 R", stars: 2, type: "Trad", height: "70 ft", pitches: 1 },
                { name: "Berga", grade: "5.9", stars: 3, type: "Sport", height: "80 ft", pitches: 1 },
                { name: "Beasto", grade: "5.10-", stars: 3.5, type: "Sport", height: "70 ft", pitches: 1 },
                { name: "Turkey Jerky", grade: "5.10c", stars: 3.5, type: "Sport", height: "80 ft", pitches: 1 },
                { name: "Snake Eyes", grade: "5.11b/c", stars: 3, type: "Sport", height: "Unknown", pitches: "var" },
                { name: "Walking With A Ghost", grade: "5.11b/c", stars: 4, type: "Sport", height: "55 ft", pitches: 1 },
                { name: "Ivy League", grade: "5.10a", stars: 3.5, type: "Sport", height: "50 ft", pitches: 1 },
                { name: "Panama Red", grade: "5.10-", stars: 4, type: "Sport", height: "50 ft", pitches: 1 },
                { name: "Route Canal", grade: "5.8+", stars: 3.5, type: "Trad", height: "50 ft", pitches: 1 },
                { name: "Gondolier Arete", grade: "5.10a", stars: 4, type: "Sport", height: "55 ft", pitches: 1 },
                { name: "The Wheel", grade: "5.5", stars: 2, type: "Trad", height: "60 ft", pitches: 1 },
                { name: "Have Fun, Do Good Things", grade: "5.10a", stars: 2.5, type: "Trad", height: "70 ft", pitches: 1 },
                { name: "Made In The Shade", grade: "5.9-", stars: 4, type: "Sport", height: "125 ft", pitches: 1 },
                { name: "Aretnophobia", grade: "5.11a", stars: 3.5, type: "Sport", height: "70 ft", pitches: 1 },
                { name: "Batso Canal", grade: "5.10c", stars: 3.5, type: "Sport", height: "55 ft", pitches: 1 },
                { name: "Lambada", grade: "5.10a/b", stars: 3.5, type: "Sport", height: "60 ft", pitches: 1 },
                { name: "Levada", grade: "5.8+", stars: 3, type: "Sport", height: "80 ft", pitches: 1 },
                { name: "2021 Evergreen Obstruction", grade: "5.7", stars: 2, type: "Trad", height: "60 ft", pitches: 1 },
                { name: "The Whopper", grade: "5.9", stars: 3, type: "Sport", height: "Unknown", pitches: 1 },
                { name: "Buckets of Rain", grade: "5.9", stars: 3, type: "Sport", height: "45 ft", pitches: 1 },
                { name: "Lame Line", grade: "5.8", stars: 2, type: "Trad/TR", height: "60 ft", pitches: 1 }
            ]
        };

        // Attach original index to preserve details lookup mapping
        canalZoneData.routes.forEach((route, index) => {
            route.originalIndex = index;
        });

        // --- 2. SORTING & LIST LOGIC ---
        
        // Parses YDS grades (e.g. 5.10a/b, 5.8+) into numeric scores for flawless sorting
        function getGradeScore(gradeStr) {
            let score = 0;
            const baseMatch = gradeStr.match(/5\.(\d+)/);
            
            if (baseMatch) {
                // 5.8 = 80, 5.10 = 100
                score = parseInt(baseMatch[1]) * 10; 
            }
            
            // Adjust for modifiers
            if (gradeStr.includes('-')) score -= 2;
            if (gradeStr.includes('+')) score += 2;
            
            if (gradeStr.includes('a/b')) score += 1.5;
            else if (gradeStr.includes('b/c')) score += 3.5;
            else if (gradeStr.includes('c/d')) score += 5.5;
            else if (gradeStr.includes('a')) score += 1;
            else if (gradeStr.includes('b')) score += 3;
            else if (gradeStr.includes('c')) score += 5;
            else if (gradeStr.includes('d')) score += 7;
            
            return score;
        }

        function sortRoutes(method) {
            let sortedRoutes = [...canalZoneData.routes];
            
            if (method === 'diff') {
                sortedRoutes.sort((a, b) => getGradeScore(a.grade) - getGradeScore(b.grade));
            } 
            // If method === 'ltr', it retains the original left-to-right order cloned above
            
            renderRoutes(sortedRoutes);
        }

        // --- 3. POPULATE UI ---
        function generateStarHTML(stars) {
            let html = '';
            const fullStars = Math.floor(stars);
            const halfStar = stars % 1 !== 0;
            
            for(let i=0; i<fullStars; i++) {
                html += `<svg class="w-4 h-4 text-neon-yellow fill-current drop-shadow-[0_0_2px_rgba(253,224,71,0.8)]" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>`;
            }
            if(halfStar) {
                html += `<svg class="w-4 h-4 text-neon-yellow drop-shadow-[0_0_2px_rgba(253,224,71,0.8)]" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" opacity="0.4"></path></svg>`;
            }
            return html;
        }

        function renderRoutes(routesToRender) {
            const container = document.getElementById('routes-container');
            container.innerHTML = '';
            
            routesToRender.forEach((route) => {
                const typeStyle = route.type.includes('Trad') 
                    ? 'border-neon-pink text-neon-pink' 
                    : 'border-neon-cyan text-neon-cyan';

                // Notice we pass route.originalIndex to correctly pull the route from the master array
                const item = `
                    <div onclick="openRouteDetail(${route.originalIndex})" class="retro-card bg-[#1e293b] flex justify-between items-center p-3 sm:p-4 rounded-lg cursor-pointer group">
                        <div class="flex-grow">
                            <h4 class="font-bold text-slate-100 group-hover:text-white transition-colors text-lg">${route.name}</h4>
                            <div class="flex items-center gap-3 mt-2">
                                <span class="font-retro text-[10px] font-bold px-1.5 py-0.5 border ${typeStyle} bg-slate-900 rounded-sm uppercase tracking-widest">${route.type}</span>
                                <span class="font-retro text-xs text-slate-400">${route.height}</span>
                                <div class="flex ml-1 hidden sm:flex">${generateStarHTML(route.stars)}</div>
                            </div>
                        </div>
                        <div class="font-retro font-bold text-xl text-white">${route.grade}</div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', item);
            });
        }
        
        // Initial render (Left to Right)
        renderRoutes(canalZoneData.routes);

        // --- ROUTE DETAIL SLIDE PANEL ---
        // Terminal text animation reference to prevent overlaps if clicked quickly
        let typeWriterTimeout; 

        function openRouteDetail(index) {
            const route = canalZoneData.routes[index];
            
            document.getElementById('detail-name').innerText = route.name;
            document.getElementById('detail-grade').innerText = route.grade;
            document.getElementById('detail-stars').innerHTML = generateStarHTML(route.stars);
            
            // LOGISTICS PARSING & CALCULATIONS
            const isTrad = route.type.includes('Trad');
            const protection = isTrad ? "Gear / Mixed" : "Bolts";
            
            const heightMatch = route.height.match(/\d+/);
            const heightFt = heightMatch ? parseInt(heightMatch[0]) : 0;
            
            let ropeSize = "Unknown";
            if (heightFt > 0) {
                ropeSize = heightFt >= 95 ? "70m MINIMUM" : "60m MINIMUM";
            }

            const terminalText = `> LOGISTICS CHECK...\n> HEIGHT: ${route.height}\n> PITCHES: ${route.pitches}\n> GEAR: ${protection}\n> ROPE: ${ropeSize}\n> STATUS: READY TO SEND`;
            
            // Terminal Typing Effect
            const infoBox = document.getElementById('detail-info');
            infoBox.innerText = '';
            clearTimeout(typeWriterTimeout); // Stop previous typing if user clicks another route rapidly
            
            let charIndex = 0;
            const typeWriter = () => {
                if (charIndex < terminalText.length) {
                    infoBox.innerHTML += terminalText.charAt(charIndex);
                    charIndex++;
                    typeWriterTimeout = setTimeout(typeWriter, 15);
                } else {
                    infoBox.innerHTML += '<span class="animate-pulse">_</span>';
                }
            };
            typeWriter();
            
            // Update Badges
            const typeStyle = isTrad ? 'border-neon-pink text-neon-pink shadow-[2px_2px_0px_#ec4899]' : 'border-neon-cyan text-neon-cyan shadow-[2px_2px_0px_#22d3ee]';
            document.getElementById('detail-badges').innerHTML = `
                <span class="px-3 py-1 bg-slate-900 text-xs font-retro font-bold border ${typeStyle}">${route.type}</span>
                <span class="px-3 py-1 bg-slate-900 text-xs font-retro font-bold border border-slate-600 text-slate-300 shadow-[2px_2px_0px_#475569]">${route.height}</span>
                <span class="px-3 py-1 bg-slate-900 text-xs font-retro font-bold border border-slate-600 text-slate-300 shadow-[2px_2px_0px_#475569]">${route.pitches} PTCH</span>
            `;

            // Slide Panel Animation
            document.getElementById('route-detail-view').classList.remove('translate-x-full');
            document.getElementById('main-list-view').classList.add('-translate-x-10', 'opacity-20');
        }

        function closeRouteDetail() {
            document.getElementById('route-detail-view').classList.add('translate-x-full');
            document.getElementById('main-list-view').classList.remove('-translate-x-10', 'opacity-20');
        }

        // --- 4. INITIALIZE MAP ---
        const map = L.map('map', {
            zoomControl: false 
        }).setView([canalZoneData.lat, canalZoneData.lng], 16);

        L.control.zoom({ position: 'topright' }).addTo(map);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri',
            maxZoom: 19
        }).addTo(map);

        // --- 5. MAP VARIABLES ---
        let cragLocation = L.latLng(canalZoneData.lat, canalZoneData.lng);
        let cragMarker = null;
        let sunRaysLayer = L.layerGroup().addTo(map);
        
        const slider = document.getElementById('day-slider');
        const dateDisplay = document.getElementById('date-display');

        const today = new Date();
        const start = new Date(today.getFullYear(), 0, 0);
        const currentDayOfYear = Math.floor((today - start) / (1000 * 60 * 60 * 24));
        slider.value = currentDayOfYear;

        // --- 6. MAP EVENT LISTENERS ---
        map.on('click', function(e) {
            cragLocation = e.latlng;
            document.getElementById('crag-coords').innerText = `${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)}`;
            updateMapFeatures();
        });

        map.on('zoomend', updateMapFeatures);
        slider.addEventListener('input', updateMapFeatures);

        setTimeout(() => {
            map.invalidateSize();
            updateMapFeatures();
        }, 100);

        new ResizeObserver(() => {
            map.invalidateSize();
            updateMapFeatures();
        }).observe(document.getElementById('map'));


        // --- 7. SUN RAY LOGIC ---
        function updateMapFeatures() {
            sunRaysLayer.clearLayers();

            // Retro Pink Center Circle
            cragMarker = L.circleMarker(cragLocation, {
                radius: 30, 
                fillColor: "#ec4899", 
                color: "#ec4899",
                weight: 2,
                dashArray: "4 6",
                opacity: 0.9,
                fillOpacity: 0.2
            }).addTo(sunRaysLayer);

            const year = new Date().getFullYear();
            const selectedDate = new Date(year, 0, 1);
            selectedDate.setDate(slider.value);
            
            // Format date retro style (e.g., APR 14)
            dateDisplay.innerText = selectedDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();

            const cragPt = map.latLngToLayerPoint(cragLocation);
            const rayLenPx = 130; 
            const innerRadiusPx = 30; 

            for (let hour = 6; hour <= 19; hour++) {
                const targetTime = new Date(selectedDate);
                targetTime.setHours(hour, 0, 0, 0);

                const pos = SunCalc.getPosition(targetTime, cragLocation.lat, cragLocation.lng);
                
                if (pos.altitude <= 0) continue;

                // Military time style for retro feel
                const timeText = hour.toString().padStart(2, '0') + "00";

                const compassAzimuth = (pos.azimuth * 180 / Math.PI) + 180;
                const screenAngle = (compassAzimuth - 90) * (Math.PI / 180);

                const sunPt = L.point(
                    cragPt.x + rayLenPx * Math.cos(screenAngle),
                    cragPt.y + rayLenPx * Math.sin(screenAngle)
                );
                const sunLatLng = map.layerPointToLatLng(sunPt);

                const tipPt = L.point(
                    cragPt.x + innerRadiusPx * Math.cos(screenAngle),
                    cragPt.y + innerRadiusPx * Math.sin(screenAngle)
                );
                const tipLatLng = map.layerPointToLatLng(tipPt);

                // Main yellow ray
                L.polyline([sunLatLng, tipLatLng], {
                    color: '#fde047',
                    weight: 3,
                    opacity: 0.8,
                    lineCap: 'square'
                }).addTo(sunRaysLayer);

                // Arrow head
                const headLen = 12; 
                const headSpread = Math.PI / 6; 

                const leftBarbPt = L.point(
                    tipPt.x + headLen * Math.cos(screenAngle - headSpread),
                    tipPt.y + headLen * Math.sin(screenAngle - headSpread)
                );
                const rightBarbPt = L.point(
                    tipPt.x + headLen * Math.cos(screenAngle + headSpread),
                    tipPt.y + headLen * Math.sin(screenAngle + headSpread)
                );

                L.polyline([
                    map.layerPointToLatLng(leftBarbPt), 
                    tipLatLng, 
                    map.layerPointToLatLng(rightBarbPt)
                ], {
                    color: '#fde047',
                    weight: 3,
                    opacity: 0.8,
                    lineCap: 'square',
                    lineJoin: 'miter'
                }).addTo(sunRaysLayer);

                const labelOffsetPx = rayLenPx + 20; 
                const labelPt = L.point(
                    cragPt.x + labelOffsetPx * Math.cos(screenAngle),
                    cragPt.y + labelOffsetPx * Math.sin(screenAngle)
                );
                
                const icon = L.divIcon({
                    className: 'clear-background',
                    html: `<div class="sun-label">${timeText}</div>`,
                    iconSize: [60, 20],
                    iconAnchor: [30, 10]
                });

                L.marker(map.layerPointToLatLng(labelPt), {
                    icon: icon,
                    interactive: false 
                }).addTo(sunRaysLayer);
            }
        }
    </script>
</body>
</html>
